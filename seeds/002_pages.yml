pages:
  name: "Product Hub"
  slug: "index"
  template_name: "index"
  settings:
    description: "<p>以「<strong>Baklib X1 智能知识中心</strong>」为锚点，统一呈现<strong>规格、物料、技术文档、常见问题与客户案例</strong>，适合企业产品门户开箱演示。</p>"

