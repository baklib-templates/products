            series: "Pro Series"
            thumb_image_url: "https://picsum.photos/seed/v200/800/600"
            description: "An 8k line-scan camera for continuous web and roll-to-roll inspection."
            spec_groups: |
              General::Line Rate::80 kHz
              General::Resolution::8192 px
              Interface::Data::CoaXPress CXP-6
              Environment::Protection Rating::IP54
              Environment::Operating Temperature::0 to 45 C
            content: |
              <h2 id="overview">Overview</h2>
              <p>VistaScan V200 is built for high-throughput surface inspection of moving material such as film, foil and textiles.</p>
              <h2 id="integration">Integration notes</h2>
              <p>Pair with an encoder for constant resolution across variable line speeds.</p>
