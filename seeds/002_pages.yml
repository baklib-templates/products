              多语言与多区域发布，一套内容多出口
              内置审批与草稿隔离，适合受控行业场景
            body: |
              <h2 id="overview">产品概述</h2>
              <p>Baklib X1 企业版将产品资料、帮助中心与客户成功知识沉淀在同一平台，支持按团队、区域与渠道拆分视图，并保持品牌与口径一致。</p>
              <h3>典型使用场景</h3>
              <ul>
                <li>面向销售与渠道伙伴的「可对外」产品手册与报价说明</li>
                <li>面向交付与二开的「对内」集成说明与版本变更</li>
                <li>面向客户成功的上线 checklist 与最佳实践</li>
              </ul>
