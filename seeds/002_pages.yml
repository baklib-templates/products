              Baklib X1 企业版规格说明.pdf|pdf|https://example.com/downloads/baklib-x1-enterprise-spec.pdf|1.8 MB
              X1 部署检查清单.xlsx|xlsx|https://example.com/downloads/baklib-x1-deployment-checklist.xlsx|420 KB
              X1 品牌组件包.zip|zip|https://example.com/downloads/baklib-x1-brand-kit.zip|12 MB
              X1 集成示例 Postman 集合.json|json|https://example.com/downloads/baklib-x1-postman.json|96 KB
            related_models: |
              X1-TEAM
            cta_trial_link: "https://example.com/trial"
            cta_quote_link: "https://example.com/contact"

        - name: "Baklib X1 团队版"
          slug: "baklib-x1-team"
          template_name: "page"
          template_style: "product"
          settings:
            product_model: "X1-TEAM"
            tagline: "为 50～500 人团队提供轻量知识库与产品说明站，分钟级上线。"
            thumb_image_url: "images/theme/thumb.png"
            hero_images: |
              https://picsum.photos/seed/baklibx1team-a/960/640
            specifications: |
              成员规模|≤ 500 人|推荐上限
              空间策略|按站点配额|可扩展
              模板数量|≤ 120 套|单站点
