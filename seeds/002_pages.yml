              https://picsum.photos/seed/baklibx1hero-a/960/640
              https://picsum.photos/seed/baklibx1hero-b/960/640
            specifications: |
              部署形态|私有化 / SaaS / 混合云|可选
              单集群推荐规模|≤ 200 万篇条目|文档对象
              全文检索延迟|P95 ≤ 280|ms
              权限模型|RBAC + 资源级 ACL|细粒度
              审计与留痕|操作 / 导出 / 登录|合规增强
              开放接口|REST + Webhook|可选模块
