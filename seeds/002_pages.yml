pages:
  name: "Product Hub"
  slug: "index"
  template_name: "index"
  settings:
    description: "<p>A working demo of the <strong>Product Hub</strong> catalog: browse products by series, industry and scenario, open a channel to see the product grid, and open any product for its spec table and rich content.</p>"

  children:
    - name: "Sensors & Vision"
      slug: "products"
      template_name: "channel"
      settings:
        thumb_image_url: "https://picsum.photos/seed/hub-sensors/1280/400"
        description: "Industrial sensors and machine-vision modules for inline measurement, inspection and identification. Demo data — replace with your real SKUs."
      children:
        - name: "VistaScan V100 Smart Camera"
          slug: "vistascan-v100"
          template_name: "page"
          tags: ["Vision", "Inline Inspection"]
          settings:
            model_code: "V100-PRO"
            industries:
              - "Electronics Manufacturing"
              - "Industrial Automation"
            scenarios:
              - "Quality Inspection"
              - "Production Line Integration"
            series: "X Series"
            thumb_image_url: "https://picsum.photos/seed/v100/800/600"
            description: "A 5 MP smart camera with on-device inference for high-speed defect detection."
            spec_groups: |
              General::Resolution::5 MP (2592 x 1944)
              General::Max Frame Rate::60 fps
              General::Sensor::1/1.8" Global Shutter CMOS
              Interface::Data::GigE Vision / USB3
              Interface::I/O::8 opto-isolated lines
              Environment::Protection Rating::IP67
              Environment::Operating Temperature::-10 to 50 C
            content: |
              <h2 id="overview">Overview</h2>
              <p>VistaScan V100 combines a global-shutter sensor with an embedded inference engine, so defect classification runs on the camera without a separate industrial PC.</p>
              <h2 id="applications">Typical applications</h2>
              <ul>
                <li>Surface defect detection on PCB assembly lines</li>
                <li>Presence / absence verification before packaging</li>
                <li>1D / 2D code reading at line speed</li>
              </ul>
            downloads: |
              V100 Datasheet|pdf|https://example.com/v100-datasheet.pdf
            doc_refs: ""
            faq_refs: ""
            case_refs: ""
            related_products: |
              V200-PRO

        - name: "VistaScan V200 Line-Scan Camera"
          slug: "vistascan-v200"
